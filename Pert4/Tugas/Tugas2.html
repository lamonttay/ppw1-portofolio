<!DOCTYPE html>
<html>

<head>
    <title>Form Pendaftaran</title>
</head>

<body>
    <h2>Form Pendaftaran</h2>
    <img src="https://i0.wp.com/www.hpi.or.id/wp-content/uploads/2021/08/logo-ugm.png?ssl=1" width="200">
    <form action="https://elok.ugm.ac.id/login/index.php/">
        <label>Nama Lengkap:</label><br>
        <input type="text" name="nama"><br><br>
        <label>Email:</label><br>
        <input type="email" name="email"><br><br>
        <label>Password:</label><br>
        <input type="password" name="password"><br><br>
        <label>Jenis Kelamin:</label><br>
        <input type="radio" name="jk"> Laki-laki
        <input type="radio" name="jk"> Perempuan
        <br><br>
        <label>Hobi:</label><br>
        <input type="checkbox"> Musik
        <input type="checkbox"> Olahraga
        <input type="checkbox"> Membaca
        <br><br>
        <img src="Gambar.jpg" width="150">
        <br><br>
        <input type="submit" value="Daftar">
    </form>
</body>
</html>
