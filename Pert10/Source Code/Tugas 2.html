<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Tugas 2</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <script>

        let mahasiswa = confirm("Apakah Anda mahasiswa PPW1?");

        if (mahasiswa) {

            let nama = prompt("Masukkan Nama:");
            let nim = prompt("Masukkan NIM:");
            let angkatan = prompt("Masukkan Angkatan:");

            let tahunLulus = parseInt(angkatan) + 4;

            let statusNim =
                (nim % 2 == 0) ? "Genap" : "Ganjil";

            document.write(`
            <h2>Data Praktikan</h2>

            <table class="table table-bordered">
                <tr>
                    <th>Nama</th>
                    <td>${nama}</td>
                </tr>

                <tr>
                    <th>NIM</th>
                    <td>${nim}</td>
                </tr>

                <tr>
                    <th>Angkatan</th>
                    <td>${angkatan}</td>
                </tr>

                <tr>
                    <th>Perkiraan Lulus</th>
                    <td>${tahunLulus}</td>
                </tr>

                <tr>
                    <th>Status NIM</th>
                    <td>${statusNim}</td>
                </tr>
            </table>
        `);
        } else {

            document.write(`
            <div class="alert alert-danger">
                Maaf anda bukan mahasiswa PPW1, akses ditolak!
            </div>
        `);
        }
    </script>
</body>
</html>
